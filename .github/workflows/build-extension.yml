name: Build & Release Extension
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Extension
        run: pnpm run build

      - name: Zip Extension
        run: |
          cd build/chrome-mv3-prod
          zip -r ../../meme-shelf-chrome-extension.zip .
          cd ../..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: meme-shelf-extension
          path: meme-shelf-chrome-extension.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: meme-shelf-chrome-extension.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
